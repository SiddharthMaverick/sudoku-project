<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sudoku Solver</h1>
        <div class="controls">
            <button id="btn-generate">Generate Board</button>
            <button id="btn-solve">Solve Board</button>
            <button id="btn-clear">Clear Board</button>
        </div>
        <div id="sudoku-board" class="board"></div>
        <div id="message" class="message"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
